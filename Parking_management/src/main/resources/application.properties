# Server
server.port=8080

# MSSQL Database Connection with Windows Authentication
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=parking_db;encrypt=true;trustServerCertificate=true
# No username/password needed when using integratedSecurity=true
spring.datasource.username=sa
spring.datasource.password=789
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServer2012Dialect
spring.jpa.properties.hibernate.format_sql=true

# Thymeleaf
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# Python AI Model API URL
ai.model.api.url=http://localhost:5000/predict

# Logging
logging.level.org.springframework.web=DEBUG