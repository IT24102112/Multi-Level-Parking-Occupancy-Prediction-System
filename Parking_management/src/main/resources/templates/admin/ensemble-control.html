<!-- ── Ensemble Weight Control ────────────────────────────────── -->
<h2>⚖️ Ensemble Model Weights</h2>
<div class="ai-chart-card" style="max-width: 640px; margin: 0 auto 2rem auto;">
  <div class="ai-chart-title">Adjust Model Influence</div>
  <div class="ai-chart-sub">
    Increase seasonal weight during festive seasons or unusual periods.
    Changes take effect immediately on the next prediction.
  </div>

  <!-- Current weights display -->
  <div style="display:flex; gap:1rem; margin-bottom:1.5rem;">
    <div class="ai-stat" style="flex:1; border-top-color:#3b82f6;">
      <div class="ai-stat-icon">⚡</div>
      <div class="ai-stat-label">SGD Real-time</div>
      <div class="ai-stat-value" id="current-sgd" style="font-size:1.8rem;">--%</div>
    </div>
    <div class="ai-stat" style="flex:1; border-top-color:var(--primary);">
      <div class="ai-stat-icon">📅</div>
      <div class="ai-stat-label">Seasonal LSTM</div>
      <div class="ai-stat-value" id="current-seasonal" style="font-size:1.8rem;">--%</div>
    </div>
  </div>

  <!-- Slider -->
  <div style="margin-bottom:1.25rem;">
    <div style="display:flex; justify-content:space-between;
                    font-size:0.88rem; font-weight:600; margin-bottom:0.5rem;">
      <span>Seasonal Model Influence</span>
      <span id="slider-value"
            style="color:var(--primary); font-family:'Outfit',sans-serif;">14%</span>
    </div>
    <input type="range" id="seasonal-slider"
           min="0" max="100" step="5" value="14"
           oninput="onSliderChange(this.value)"
           style="width:100%; accent-color:var(--primary);">
    <div style="display:flex; justify-content:space-between;
                    font-size:0.75rem; color:var(--text-muted); margin-top:0.3rem;">
      <span>More Real-time</span>
      <span>Balanced</span>
      <span>More Seasonal</span>
    </div>
  </div>

  <!-- Preset buttons -->
  <div style="margin-bottom:1.25rem;">
    <div style="font-size:0.82rem; color:var(--text-muted);
                    font-weight:600; margin-bottom:0.6rem;">Quick Presets:</div>
    <div style="display:flex; flex-wrap:wrap; gap:0.5rem;">
      <button class="btn btn-secondary"
              style="font-size:0.8rem; padding:0.35rem 0.9rem;"
              onclick="applyPreset(14, 'Normal period')">Normal (14%)</button>
      <button class="btn btn-secondary"
              style="font-size:0.8rem; padding:0.35rem 0.9rem;"
              onclick="applyPreset(30, 'Moderately unusual')">Moderate (30%)</button>
      <button class="btn btn-secondary"
              style="font-size:0.8rem; padding:0.35rem 0.9rem;"
              onclick="applyPreset(50, 'Festive season')">Festive (50%)</button>
      <button class="btn btn-secondary"
              style="font-size:0.8rem; padding:0.35rem 0.9rem;"
              onclick="applyPreset(70, 'Highly unusual period')">High Seasonal (70%)</button>
    </div>
  </div>

  <!-- Apply button -->
  <button class="btn" style="width:100%; padding:0.75rem;"
          onclick="applyWeights()">
    Apply Weights
  </button>

  <!-- Status message -->
  <div id="weight-status"
       style="margin-top:0.75rem; font-size:0.85rem;
                min-height:1.2rem; text-align:center;"></div>
</div>
