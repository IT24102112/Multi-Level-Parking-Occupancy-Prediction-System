<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Event Form | KMC Smart Car Park</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
  <style>
    .form-page {
      min-height: calc(100vh - 68px - 60px);
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 3rem 1rem;
      background: linear-gradient(160deg, var(--surface-2) 0%, var(--surface-3) 100%);
    }
    .form-wrapper { width: 100%; max-width: 560px; }
    .form-wrapper h2 { justify-content: center; }
  </style>
</head>
<body>
<div th:replace="fragments/header :: header"></div>
<div class="form-page">
  <div class="form-wrapper">
    <h2 th:if="${event.id == null}">📅 Add New Event</h2>
    <h2 th:unless="${event.id == null}">✏️ Edit Event</h2>
    <div class="form-card" style="margin-top:1.5rem;">
      <form th:action="@{/admin/events/save}" th:object="${event}" method="post">
        <input type="hidden" name="id" th:value="*{id}"/>
        <div class="form-group">
          <label for="title">Event Title</label>
          <input type="text" id="title" th:field="*{title}"
                 placeholder="e.g. Kandy Esala Perahera" required>
          <span th:if="${#fields.hasErrors('title')}" th:errors="*{title}" class="error"></span>
        </div>
        <div class="form-group">
          <label for="description">Description</label>
          <textarea id="description" th:field="*{description}" rows="3"
                    placeholder="Brief description of the event and expected impact on parking…"></textarea>
        </div>
        <div class="form-group">
          <label for="startDate">Start Date &amp; Time</label>
          <input type="datetime-local" id="startDate" th:field="*{startDate}" required>
        </div>
        <div class="form-group">
          <label for="endDate">End Date &amp; Time</label>
          <input type="datetime-local" id="endDate" th:field="*{endDate}" required>
        </div>
        <div style="display:flex;gap:0.75rem;margin-top:0.5rem;">
          <button type="submit" class="btn btn-accent" style="flex:1;justify-content:center;">
            Save Event
          </button>
          <a th:href="@{/admin/events}" class="btn btn-secondary" style="flex:1;justify-content:center;">
            Cancel
          </a>
        </div>
      </form>
    </div>
  </div>
</div>
<div th:replace="fragments/footer :: footer"></div>
</body>
</html>
