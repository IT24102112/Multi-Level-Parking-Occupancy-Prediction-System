<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | KMC Smart Car Park</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
  <style>
    .login-page {
      min-height: calc(100vh - 68px - 60px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 1rem;
      background: linear-gradient(160deg, var(--surface-2) 0%, var(--surface-3) 100%);
    }
    .login-wrapper {
      width: 100%;
      max-width: 420px;
    }
    .login-brand {
      text-align: center;
      margin-bottom: 2rem;
    }
    .login-brand h2 {
      border: none;
      font-size: 1.75rem;
      justify-content: center;
      margin-bottom: 0.35rem;
    }
    .login-brand p {
      color: var(--text-muted);
      font-size: 0.9rem;
    }
    .role-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      background: var(--accent-dim);
      border: 1px solid rgba(245,166,35,0.3);
      color: #92580a;
      font-weight: 700;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      padding: 0.35rem 0.9rem;
      border-radius: 20px;
      margin-bottom: 1.5rem;
    }
    body.dark-mode .role-badge { color: var(--accent-light); }
    .login-footer-note {
      text-align: center;
      margin-top: 1.25rem;
      font-size: 0.88rem;
      color: var(--text-muted);
    }
  </style>
</head>
<body>
<div th:replace="fragments/header :: header"></div>

<div class="login-page">
  <div class="login-wrapper">
    <div class="login-brand">
      <h2>Sign In</h2>
      <p>KMC Smart Car Park Management System</p>
    </div>

    <div class="form-card">
      <div style="text-align:center;">
                <span class="role-badge"
                      th:text="${selectedRole == 'kmc' ? '🏛 KMC Admin' : (selectedRole == 'it' ? '⚙️ IT Admin' : '🚗 Parking User')}">
                </span>
      </div>

      <form th:action="@{/admin/login}" method="post">
        <input type="hidden" name="role" th:value="${selectedRole}"/>

        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" name="username"
                 placeholder="Enter your username" required autofocus>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password"
                 placeholder="Enter your password" required>
        </div>

        <div th:if="${param.error}" class="alert alert-error">
          <span>⚠</span> Invalid credentials or role mismatch.
        </div>

        <button type="submit" class="btn btn-accent" style="width:100%;justify-content:center;padding:0.7rem;">
          Sign In →
        </button>
      </form>

      <div class="login-footer-note">
        <a th:href="@{/admin/select}">← Back to role selection</a>
      </div>
    </div>
  </div>
</div>

<div th:replace="fragments/footer :: footer"></div>
</body>
</html>
