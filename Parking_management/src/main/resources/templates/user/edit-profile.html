<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Profile | KMC Smart Car Park</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .form-page {
            min-height: calc(100vh - 68px - 60px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 3rem 1rem;
            background: linear-gradient(160deg, var(--surface-2) 0%, var(--surface-3) 100%);
        }
        .form-wrapper { width: 100%; max-width: 480px; }
        .form-brand { text-align: center; margin-bottom: 2rem; }
        .form-brand h2 { border: none; font-size: 1.75rem; justify-content: center; margin-bottom: 0.35rem; }
        .form-brand p { color: var(--text-muted); font-size: 0.9rem; }
    </style>
</head>
<body>
<div th:replace="fragments/header :: header"></div>
<div class="form-page">
    <div class="form-wrapper">
        <div class="form-brand">
            <h2>✏️ Edit Profile</h2>
            <p>Update your account information</p>
        </div>
        <div class="form-card">
            <form th:action="@{/user/update-profile}" method="post">
                <div class="form-group">
                    <label for="fullName">Full Name</label>
                    <input type="text" id="fullName" name="fullName"
                           th:value="${user.fullName}"
                           placeholder="Your full name" required>
                </div>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email"
                           th:value="${user.email}"
                           placeholder="your@email.com" required>
                </div>
                <div style="display:flex;gap:0.75rem;margin-top:0.5rem;">
                    <button type="submit" class="btn btn-accent" style="flex:1;justify-content:center;">
                        Save Changes
                    </button>
                    <a th:href="@{/user/dashboard}" class="btn btn-secondary" style="flex:1;justify-content:center;">
                        Cancel
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
<div th:replace="fragments/footer :: footer"></div>
</body>
</html>
